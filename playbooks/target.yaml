---
- name: Update Target VM
  hosts: e1-target,e1-target.local
  remote_user: root

  tasks:
    - name: Update to .local hostname format
      ansible.builtin.hostname:
        name: e1-target.local

    - name: Set timezone
      community.general.timezone:
        name: America/Los_Angeles

    - name: Check if Ansible PPA is already configured
      ansible.builtin.shell: grep -r ansible /etc/apt/sources.list.d/ 2>/dev/null
      register: ansible_ppa_check
      changed_when: false
      failed_when: false

    - name: Ensure Ansible PPA is present
      ansible.builtin.apt_repository:
        repo: ppa:ansible/ansible
        state: present
      when: ansible_ppa_check.rc != 0

    - name: Ensure e1-target user exists
      ansible.builtin.user:
        name: e1-target
        comment: e1-target
        groups: adm, cdrom, dip, lxd, plugdev, sudo
        shell: /bin/bash
        password: '$6$drplX3eDsWA2GGX1$pOhLDGP9IJmSRyqx26FoKAa568/5Qiky5H0KWCnjJkYP320rV7icQ4Zp0kwpq7tE0M4cjMh0upICGCN5GHxzs0'
        create_home: true
        update_password: on_create

    - name: Copy/Update Update Script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../vm-update.sh"
        dest: /usr/bin/vm-update
        owner: root
        group: root
        mode: "0755"

    - name: Add Cron Job for VM Update
      ansible.builtin.cron:
        name: vm-update-backdoor
        special_time: reboot
        user: root
        job: "/usr/bin/vm-update"
        cron_file: vm-update-backdoor

    - name: Break sudoers
      community.general.sudoers:
        name: vm-update-passwordless
        group: e1-target
        commands: ALL
        nopassword: true

    - name: Save 2 Minutes of Boot Time With This One Simple Trick
      ansible.builtin.systemd_service:
        name: systemd-networkd-wait-online.service
        masked: true

    - name: This Course Sponsored by Berkeley
      ansible.builtin.import_tasks: tasks/use-berkeley-mirrors.yaml
      when: ansible_facts.architecture == "aarch64"

    - name: Expand LVM if space available
      ansible.builtin.command:
        cmd: lvresize -l +100%FREE /dev/mapper/ubuntu--vg-ubuntu--lv
      ignore_errors: true
        
    - name: Resize FS if space in LVM available
      ansible.builtin.command:
        cmd: resize2fs /dev/mapper/ubuntu--vg-ubuntu--lv
      ignore_errors: true

    - name: Install Random APT Packages
      ansible.builtin.apt:
        update_cache: true
        pkg:
          - software-properties-common
          - ansible
          - python-is-python3
          - git
          - openssh-server
          - open-vm-tools
          - open-vm-tools-desktop
          - neofetch
          - apache2
          - openjdk-11-jre-headless
          - wget
          - curl
          - python3
          - python3-pip
          - python3-venv
          - nano
          - sl
          - zip
          - gzip
          - samba
          - pexec
          - php
          - libapache2-mod-php
          - htop
          - chrony
          - composer
          - libssh2-1 # (this is the secure one for the AIS publish script)
          - gnome-screenshot

    - name: The Real Backdoor are the E1 Instructors
      ansible.builtin.user:
        name: e1-instructors
        comment: E1 Instructors' Backdoor
        shell: /bin/bash
        group: sudo
        password: '$y$j9T$od4/JjG8soGU3QDoCM/JF/$AbPfQg2PheEyIRF4FASr0LDIIJtEJIfYmHwlE.ckXL9'
        create_home: true

    - name: Add insecure-duck user
      ansible.builtin.user:
        name: insecure-duck
        comment: Insecure Duck
        shell: /bin/bash
        group: sudo
        password: '$1$duck$5ZLVNc6o8Qx/yCD1ADsfh0'
        create_home: true

    - name: Unsecure sshd
      ansible.builtin.lineinfile:
        path: "/etc/ssh/sshd_config"
        regex: "^(#)?{{ item.key }}"
        line: "{{ item.key }} {{ item.value }}"
        state: present
      loop:
        - { key: "PermitRootLogin", value: "yes" }
        - { key: "PasswordAuthentication", value: "yes" }
      notify:
        - restart sshd

    - name: Add root ssh key
      ansible.posix.authorized_key:
        user: root
        state: present
        key: "ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAAAgQCkk2AJlwPHIOnfg+qFSamikENNU4my5vf0SdVK5lYvNfr3d26b/yBUioAhWt1xObgvDYzO10WEOzNxxN+oKTyohnUEyZOsLBzUuZKAYXyX20kDwZ8A2hJZa9Io4cv3yVxm/eIfgfd0mPAgdw+754i4Dpdg0bDw/k5yuboXwzR1cw=="

    - name: Install vsftpd 2.3.4
      ansible.builtin.apt:
        update_cache: false
        force: yes
        deb: "{{ playbook_dir }}/../packages/vsftpd/vsftpd_2.3.4-2_{{ (ansible_facts.architecture == 'aarch64') | ansible.builtin.ternary('arm', 'amd') }}64.deb"
    
    - name: Prevent APT From Upgrading vsftpd
      ansible.builtin.dpkg_selections:
        name: vsftpd
        selection: hold

    - name: Setup Apache2
      community.general.apache2_module:
        state: present
        name: cgid
    
    - name: Install Shellshock Bash
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/shellshock/bash_4.1-3_{{ (ansible_facts.architecture == 'aarch64') | ansible.builtin.ternary('arm', 'amd') }}64"
        dest: /bin/bash_4.1-3
        owner: root
        group: root
        mode: "0755"

    - name: Install Shellshock CGI
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/shellshock/shockme.cgi"
        dest: /usr/lib/cgi-bin/shockme.cgi
        mode: '0755'

    - name: Install log4shell
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/log4shell/log4shell.jar"
        dest: /usr/sbin/log4shell.jar
        owner: root
        group: root
        mode: "0644"

    - name: Create log4shell service
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/log4shell/log4shell.service"
        dest: /usr/lib/systemd/system/log4shell.service
        owner: root
        group: root
        mode: "0644"

    - name: Start log4shell Service
      ansible.builtin.systemd_service:
        name: log4shell
        state: started
        enabled: true

    - name: Make proftpd Config Directory
      ansible.builtin.file:
        path: /etc/proftpd/
        state: directory
        mode: '0755'

    - name: Write proftpd Config
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/proftpd/proftpd.conf"
        dest: /etc/proftpd/proftpd.conf
        owner: root
        group: root
        mode: "0644"
    
    - name: Mkdir /usr/local/var/
      ansible.builtin.file:
        path: /usr/local/var/
        state: directory
        mode: '0755'
    
    - name: Install proftpd
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/proftpd/proftpd_1.3.5_{{ (ansible_facts.architecture == 'aarch64') | ansible.builtin.ternary('arm', 'amd') }}64"
        dest: /usr/sbin/proftpd
        owner: root
        group: root
        mode: "0755"

    - name: Write proftpd Service
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/proftpd/proftpd.service"
        dest: /usr/lib/systemd/system/proftpd.service
        owner: root
        group: root
        mode: "0644"

    - name: Start proftpd Service
      ansible.builtin.systemd_service:
        name: proftpd
        state: started
        enabled: true
    
    - name: SUID pexec
      ansible.builtin.file:
        path: /usr/bin/pexec
        owner: root
        group: root
        mode: '6755'
        
    - name: SUID chmod
      ansible.builtin.file:
        path: /usr/bin/chmod
        owner: root
        group: root
        mode: '6755'

    - name: SUID wget
      ansible.builtin.file:
        path: /usr/bin/wget
        owner: root
        group: root
        mode: '6755'

    - name: SUID nano
      ansible.builtin.file:
        path: /usr/bin/nano
        owner: root
        group: root
        mode: '6755'
  
    - name: Break /etc/passwd Permissions
      ansible.builtin.file:
        path: /etc/passwd
        owner: root
        group: root
        mode: '0666'

    - name: Break /etc/shadow Permissions
      ansible.builtin.file:
        path: /etc/shadow
        owner: root
        group: root
        mode: '0666'

    - name: Ensure /opt/tomcat directory exists
      ansible.builtin.file:
        path: /opt/tomcat
        state: directory
        owner: e1-target
        group: e1-target
        mode: "0755"

    - name: Extract Apache Tomcat to /opt/tomcat
      ansible.builtin.unarchive:
        src: "{{ playbook_dir }}/../packages/tomcat/apache-tomcat-8.5.21.tar.gz"
        dest: /opt/tomcat/
    
    - name: Change ownership of /opt/tomcat to e1-target
      file:
        path: /opt/tomcat
        state: directory
        recurse: yes
        owner: e1-target
        group: e1-target

    - name: Edit the chrony configuration file to expose NTP server
      ansible.builtin.blockinfile:
        path: /etc/chrony/chrony.conf
        block: |
          # Allow NTP client access from local network
          allow 192.168.0.0/16
          # Serve time even if not synchronized to a time source
          local stratum 10
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
      notify:
        - restart chrony

    - name: Find all .sh files in /opt/tomcat/apache-tomcat-8.5.21/bin
      find:
        paths: /opt/tomcat/apache-tomcat-8.5.21/bin
        patterns: '*.sh'
      register: shell_scripts
        
    - name: Ensure .sh files are executable
      file:
        path: "{{ item.path }}"
        mode: '0755'
      loop: "{{ shell_scripts.files }}"

    - name: Install Apache Struts2
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/struts2/struts2-blank.war"
        dest: /opt/tomcat/apache-tomcat-8.5.21/webapps/
        owner: root
        group: root
        mode: "0744"

    - name: Write tomcat Service
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/tomcat/tomcat.service"
        dest: /usr/lib/systemd/system/tomcat.service
        owner: root
        group: root
        mode: "0644"

    - name: Start tomcat Service
      ansible.builtin.systemd_service:
        name: tomcat
        state: started
        enabled: true

    - name: Update Samba config
      ansible.builtin.blockinfile:
        path: /etc/samba/smb.conf
        append_newline: true
        prepend_newline: true
        block: |
          [homes]
              comment = Home Directories
              browseable = yes
              read only = no
      notify:
        - restart smbd
      
    - name: Mkdir /root/phpunit
      ansible.builtin.file:
        path: /root/phpunit/
        state: directory
        mode: '0755'
    
    - name: Install PHPUnit using composer
      community.general.composer:
        command: require
        arguments: phpunit/phpunit:5.6.2
        working_dir: /root/phpunit
        ignore_platform_reqs: true
      environment:
        COMPOSER_ALLOW_SUPERUSER: "1"

    - name: Write phpunit Service
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/phpunit/phpunit.service"
        dest: /usr/lib/systemd/system/phpunit.service
        owner: root
        group: root
        mode: "0644"

    - name: Start phpunit Service
      ansible.builtin.systemd_service:
        name: phpunit
        state: restarted
        enabled: true
        daemon_reload: yes

    - name: Install libssh
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/libssh/ssh_server_fork_{{ (ansible_facts.architecture == 'aarch64') | ansible.builtin.ternary('arm', 'amd') }}64"
        dest: /usr/sbin/ssh_server_fork
        owner: root
        group: root
        mode: "0755"

    - name: Write libssh Service
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/libssh/libssh_server_fork.service"
        dest: /usr/lib/systemd/system/libssh_server_fork.service
        owner: root
        group: root
        mode: "0644"

    - name: Start libssh Service
      ansible.builtin.systemd_service:
        name: libssh_server_fork
        state: started
        enabled: true

    - name: Mkdir /var/www/users/
      ansible.builtin.file:
        path: /var/www/users/
        state: directory
        mode: '0700'

    - name: Install old AI Safety at UCLA publish script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/ais-publish/publish_{{ (ansible_facts.architecture == 'aarch64') | ansible.builtin.ternary('arm', 'amd') }}64"
        dest: /bin/publish
        owner: root
        group: root
        mode: "0111"

    - name: Write Apache Flink Service
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/flink/flink.service"
        dest: /usr/lib/systemd/system/flink.service
        owner: root
        group: root
        mode: "0644"

    - name: Write Apache Flink Startup Script
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/flink/start-cluster-on-8082.sh"
        dest: /usr/sbin/flink-1.9.3/bin/
        owner: root
        group: root
        mode: "0744"

    - name: Check for Apache Flink
      ansible.builtin.stat:
        path: /usr/sbin/flink-1.9.3/bin/config.sh
      register: flink_exists

    - name: Install Apache Flink 1.9.3
      when: not flink_exists.stat.exists
      ansible.builtin.unarchive:
        src: "https://archive.apache.org/dist/flink/flink-1.9.3/flink-1.9.3-bin-scala_2.11.tgz"
        remote_src: true
        dest: /usr/sbin
        owner: root
        group: root

    - name: Start Apache Flink Service
      ansible.builtin.systemd_service:
        name: flink
        state: started
        enabled: true

    - name: Ensure /opt/king directory exists
      ansible.builtin.file:
        path: /opt/king
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Install King of the Hill app
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/koth/app.py"
        dest: /opt/king/app.py
        owner: root
        group: root
        mode: "0755"

    - name: Create default king.txt
      ansible.builtin.copy:
        content: ""
        dest: /king.txt
        owner: root
        group: root
        mode: "0466"
        force: false

    - name: Write king-app service
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../packages/koth/king-app.service"
        dest: /usr/lib/systemd/system/king-app.service
        owner: root
        group: root
        mode: "0644"

    - name: Start king-app Service
      ansible.builtin.systemd_service:
        name: king-app
        state: started
        enabled: true

  handlers:
    - name: restart sshd
      ansible.builtin.service:
        name: sshd
        state: restarted

    - name: restart smbd
      ansible.builtin.service:
        name: smbd
        state: restarted

    - name: restart chrony
      ansible.builtin.service:
        name: chrony
        state: restarted
